<!-- service worker -->
<script>
if ('serviceWorker' in navigator) {
	window.addEventListener('load', function() {
		// 获取正确的 Service Worker 路径
		const swPath = window.location.pathname.includes('/repo-name/') ? '/repo-name/service-worker.js' : '/service-worker.js';
		
		navigator.serviceWorker.register(swPath)
			.then(function(registration) {
				console.log('ServiceWorker registration successful');
			})
			.catch(function(err) {
				console.log('ServiceWorker registration failed: ', err);
			});
	});
}
</script>

<!-- end service worker -->

<!-- title -->
<script>
	let originalTitle = document.title;
	let leaveMessage = "Miku! ";

	document.addEventListener('DOMContentLoaded', async function() {
		// 等待语言系统初始化
		await InitializeLanguageSystem();
		
		// 获取当前语言的离开消息
		const langData = LanguageManager.GetCurrentLanguageData();
		leaveMessage = langData.translations['title_leave-message'] || "Miku! ";
		originalTitle = langData.translations['title'] || originalTitle;
	});

	document.addEventListener("visibilitychange", function () {
		if (document.hidden) {
			document.title = " (>_<) " + leaveMessage + originalTitle;
		} else {
			document.title = originalTitle;
		}
	});

</script>
<!-- end title -->

<!-- protected media -->
<script>
	const protectedMediaElements = document.querySelectorAll('.protected-media');

	protectedMediaElements.forEach(element => {
		element.addEventListener('contextmenu', event => {
			event.preventDefault();
		});

		element.setAttribute('draggable', false);
		element.addEventListener('dragstart', event => {
			event.preventDefault();
		});

		element.addEventListener('copy', event => {
			event.preventDefault();
		});
	});
</script>

<!-- end protected media -->
