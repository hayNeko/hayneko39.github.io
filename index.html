<!-- dock avatar particle -->
<script>
	function createParticles(x, y) {
		const particleCount = 15;
		const particleColors = [
			'#FF6B6B',
			'#4ECDC4',
			'#FFD166',
			'#06D6A0',
			'#118AB2',
			'#EF476F',
			'#073B4C'
		];
				
		for (let i = 0; i < particleCount; i++) {
			const particle = document.createElement('div');
			particle.classList.add('particle');
			
			const color = particleColors[Math.floor(Math.random() * particleColors.length)];
			particle.style.backgroundColor = color;
			
			const size = Math.random() * 8 + 4; // 4-12px
			particle.style.width = `${size}px`;
			particle.style.height = `${size}px`;
			
			const angle = Math.random() * Math.PI * 2;
			const distance = Math.random() * 30 + 10;
			const startX = x + Math.cos(angle) * distance;
			const startY = y + Math.sin(angle) * distance;
			
			particle.style.left = `${startX}px`;
			particle.style.top = `${startY}px`;
			
			document.body.appendChild(particle);
			
			const duration = Math.random() * 1000 + 1000;
			const endX = startX + (Math.random() - 0.5) * 100;
			const endY = startY + 200 + Math.random() * 100;
			
			particle.animate([
				{
					transform: 'translate(0, 0) scale(1)',
					opacity: 1
				},
				{
					transform: `translate(${endX - startX}px, ${endY - startY}px) scale(0.1)`,
					opacity: 0
				}
			], {
				duration: duration,
				easing: 'cubic-bezier(0.215, 0.610, 0.355, 1)',
				fill: 'forwards'
			});
			
			setTimeout(() => {
				if (particle.parentNode) {
					particle.parentNode.removeChild(particle);
				}
			}, duration);
		}
		console.log("created");
	}
		
	function HandleDockClickEvent_EmmitParticle() {
		const avatar = document.getElementById('avatar');

		console.log("clicked");
		
		avatar.classList.add('clicked');
		
		const rect = avatar.getBoundingClientRect();
		const centerX = rect.left + rect.width / 2;
		const centerY = rect.top + rect.height / 2;
		
		createParticles(centerX, centerY);
		
		setTimeout(() => {
			avatar.classList.remove('clicked');
		}, 300);
	}
</script>
<!-- end dock avatar particle -->

<!-- theme switcher -->
<script>
	let current_theme = 0;       // 0: dark, 1: light
	const switchThemeButton = document.getElementById('theme');

	function SwitchTheme() {
		if (current_theme === 0) {
			document.documentElement.classList.add("light-theme")
			current_theme = 1;
			switchThemeButton.innerHTML = `<i class="fa-solid fa-sun"></i>`;
			// alert("Switched to light theme!");
		}
		else if (current_theme === 1) {
			document.documentElement.classList.remove("light-theme")
			current_theme = 0;
			switchThemeButton.innerHTML = `<i class="fa-solid fa-moon"></i>`;
		}
		else {
			document.documentElement.classList.add("light-theme")
			current_theme = 1;
		}
	}
</script>
<!-- end theme switcher -->
