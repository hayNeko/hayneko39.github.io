<!DOCTYPE html>
<html>
<head>
    <title>Force vs Motion Simulation</title>
    <style>
        @import url("root-theme-colors.css");
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        canvas {
            border: 1px solid #333;
            background: var(--bg-secondary);
        }
        .controls {
            margin-top: 10px;
        }
        .readout {
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h3>力學大神模擬：力與運動的關係 (F = ma)</h3>
    <canvas id="simCanvas" width="800" height="200"></canvas>
    
    <div class="controls">
        <label>施力 (Force, N): <span id="forceVal">0</span></label><br>
        <input type="range" id="forceSlider" min="-10" max="10" step="0.5" value="0" style="width: 300px;">
        <br>
        <button onclick="resetSim()">重置 (Reset)</button>
    </div>

    <div class="readout">
        質量 (Mass): 2 kg<br>
        加速度 (a = F/m): <span id="accVal">0.00</span> m/s²<br>
        速度 (v): <span id="velVal">0.00</span> m/s<br>
        位置 (x): <span id="posVal">0.00</span> m
    </div>

    <br>
    <br>

    <h3>公式</h3>

    <img src="medias/picures/QianJianTec1764155459272.jpg" width="500">

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // Physics variables
        const mass = 2.0; // kg
        let force = 0.0;
        let acc = 0.0;
        let vel = 0.0;
        let pos = 50.0; // initial x position
        
        // Time step
        let lastTime = performance.now();

        // UI Elements
        const slider = document.getElementById('forceSlider');
        const forceDisplay = document.getElementById('forceVal');
        const accDisplay = document.getElementById('accVal');
        const velDisplay = document.getElementById('velVal');
        const posDisplay = document.getElementById('posVal');

        slider.oninput = function() {
            force = parseFloat(this.value);
            forceDisplay.innerText = force;
        };

        function resetSim() {
            force = 0;
            slider.value = 0;
            forceDisplay.innerText = 0;
            vel = 0;
            pos = 50;
            acc = 0;
        }

        function update(timestamp) {
            const dt = (timestamp - lastTime) / 1000; // convert to seconds
            lastTime = timestamp;

            // Physics Logic: F = ma => a = F/m
            acc = force / mass;
            
            // Kinematics: v = u + at
            vel += acc * dt;
            
            // Position: s = s0 + vt
            pos += vel * dt * 50; // *50 for pixel scaling visual

            // Boundary handling (loop around)
            if (pos > canvas.width) pos = 0;
            if (pos < 0) pos = canvas.width;

            draw();
            updateReadout();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Floor
            ctx.beginPath();
            ctx.moveTo(0, 150);
            ctx.lineTo(canvas.width, 150);
            ctx.stroke();

            // Draw Block
            ctx.fillStyle = '#3498db';
            ctx.fillRect(pos, 100, 50, 50);

            // Draw Force Vector
            if (force !== 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 3;
                const arrowLen = force * 10;
                const startX = pos + 25;
                const startY = 125;
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX + arrowLen, startY);
                ctx.stroke();

                // Arrowhead
                ctx.beginPath();
                ctx.fillStyle = '#e74c3c';
                const headSize = 5;
                if (force > 0) {
                    ctx.moveTo(startX + arrowLen, startY);
                    ctx.lineTo(startX + arrowLen - headSize, startY - headSize);
                    ctx.lineTo(startX + arrowLen - headSize, startY + headSize);
                } else {
                    ctx.moveTo(startX + arrowLen, startY);
                    ctx.lineTo(startX + arrowLen + headSize, startY - headSize);
                    ctx.lineTo(startX + arrowLen + headSize, startY + headSize);
                }
                ctx.fill();
                ctx.lineWidth = 1; // reset
            }
        }

        function updateReadout() {
            accDisplay.innerText = acc.toFixed(2);
            // Show velocity scaled down for readability
            velDisplay.innerText = (vel).toFixed(2);
            posDisplay.innerText = (pos/50).toFixed(2);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
